services:
  postgres:
    image: postgres:16
    container_name: edugen-postgres
    restart: unless-stopped
    stop_grace_period: 5s # natychmiastowe ubijanie kontenera
    env_file:
      - .env                          # dostarcza POSTGRES_PASSWORD
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - edugen_postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    networks:
      - backend_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 3s
      retries: 3

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: edugen-backend
    stop_grace_period: 2s # natychmiastowe ubijanie kontenera
    ports:
      - "0.0.0.0:8000:8000"
    volumes:
      - edugen_data:/app/data
      - ./backend/common_filles:/app/common_filles:ro
    environment:
      - UV_PROJECT_ENVIRONMENT=/app/.venv
      - DATABASE_URL=postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:${POSTGRES_PORT}/${POSTGRES_DB}
      - DATA_DIR=${DATA_DIR}
      - MAX_FILE_SIZE_MB=${MAX_FILE_SIZE_MB}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_ALGORITHM=${JWT_ALGORITHM}
      - JWT_EXPIRATION_MINUTES=${JWT_EXPIRATION_MINUTES}
    command: ["uv", "run", "sh", "-c", "python app/init_app.py && uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - backend_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        BACKEND_URL: http://backend:8000
    container_name: edugen-frontend
    stop_grace_period: 2s # natychmiastowe ubijanie kontenera
    ports:
      - "0.0.0.0:3000:3000"
    volumes:
      - ./common_filles:/app/common_filles:ro
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    depends_on:
      backend:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - backend_network

volumes:
  edugen_data:
  edugen_postgres_data:

networks:
  backend_network:
    driver: bridge