
services:
  postgres:
    image: postgres:16
    container_name: edugen-postgres
    restart: unless-stopped
    env_file:
      - .env                          # dostarcza POSTGRES_PASSWORD
    environment:
      POSTGRES_DB: edugen
      POSTGRES_USER: edugen_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - edugen_postgres_data:/var/lib/postgresql/data
    networks:
      - backend_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U edugen_user -d edugen"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: edugen-backend
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - edugen_data:/app/data
      - ./common_filles:/app/common_filles
    env_file:
      - .env                          # wszystkie zmienne z jednego pliku root
    environment:
      # Nadpisuje DATABASE_URL z .env — używa hosta "postgres" (sieć Docker)
      - UV_PROJECT_ENVIRONMENT=/app/.venv
      - DATABASE_URL=postgresql+psycopg://edugen_user:${POSTGRES_PASSWORD}@postgres:5432/edugen
    command: ["uv", "run", "sh", "-c", "uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - backend_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - BACKEND_URL=http://backend:8000
    container_name: edugen-frontend
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - NODE_ENV=production
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - backend_network

volumes:
  edugen_data:
    driver: local
  edugen_postgres_data:
    driver: local

networks:
  backend_network:
    driver: bridge
